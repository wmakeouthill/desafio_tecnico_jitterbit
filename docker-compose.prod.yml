services:
  api:
    image: wmakeouthill/jitterbit-api:latest
    container_name: jitterbit-api
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jitterbit-network

  mongodb:
    image: mongo:7
    container_name: jitterbit-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - jitterbit-network

  mongo-express:
    image: mongo-express:1-20
    container_name: jitterbit-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017/
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jitterbit-network

volumes:
  mongodb_data:

networks:
  jitterbit-network:
    driver: bridge
