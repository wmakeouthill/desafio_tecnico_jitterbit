<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desafio Técnico Jitterbit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid #1e293b;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 0.875rem;
      color: #64748b;
      margin-bottom: 1.5rem;
    }

    a {
      display: inline-block;
      font-size: 0.8125rem;
      color: #6366f1;
      text-decoration: none;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 0.4rem 0.9rem;
      transition: border-color 0.2s, color 0.2s;
    }

    a:hover {
      border-color: #6366f1;
      color: #818cf8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Redirecionando para a aplicação...</h1>
    <p>Você será levado automaticamente em instantes.</p>
    <a id="link" href="http://204.216.170.224:3000">Clique aqui se não for redirecionado</a>
  </div>

  <script>
    const TARGET = "http://204.216.170.224:3000";
    // Preserva o path caso o usuário acesse uma sub-rota diretamente
    // ex: seuuser.github.io/repo/orders → redireciona para :3000/orders
    const path = window.location.pathname.replace(/^\/[^/]+/, "") || "/";
    const dest = TARGET + path + window.location.search + window.location.hash;
    document.getElementById("link").href = dest;
    window.location.replace(dest);
  </script>
</body>
</html>
